<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Diário de Obra — Registro diário para obras públicas">
  <meta name="theme-color" content="#F5C800">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Diário Obra">
  <link rel="manifest" href="/manifest.json">
  <title>SITE LOG PRO — Diário de Obra</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ================== LOADING OVERLAY ================== -->
<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Carregando...</div>
</div>

<!-- ================== TOAST ================== -->
<div class="toast" id="toast"></div>

<!-- ======================================================
     TELA HOME
     ====================================================== -->
<div id="screen-home">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo">SITE <span>LOG</span> PRO</div>
    <div class="badge-online online" id="online-badge">ONLINE</div>
  </div>

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-label">ACTIVE SITES</div>
      <div class="stat-value" id="stat-obras">00</div>
    </div>
    <div class="stat-box highlight">
      <div class="stat-label">PENDING LOGS</div>
      <div class="stat-value" id="stat-pending">00</div>
    </div>
  </div>

  <!-- BUSCA -->
  <div class="search-area">
    <input type="search" class="search-input" id="search-input"
           placeholder="🔍  BUSCAR OBRAS...">
  </div>

  <!-- LISTA DE OBRAS -->
  <div class="obras-list pb-btn" id="obras-list">
    <div class="empty-state">
      <div class="icon">⏳</div>
      <div class="msg">Carregando obras...</div>
    </div>
  </div>

  <!-- BTN REGISTRAR FIXO -->
  <button class="btn-registrar-fixed" onclick="mostrarSeletorObra()">
    📝 REGISTRAR HOJE +
  </button>

</div><!-- /screen-home -->


<!-- ======================================================
     TELA DE PASSOS (FLUXO)
     ====================================================== -->
<div id="screen-steps" style="display:none; padding-bottom:80px">

  <!-- TOP BAR -->
  <div class="top-bar">
    <button class="btn-back" id="btn-back-step" onclick="voltarPasso()">←</button>
    <div class="logo">SITE <span>LOG</span> PRO</div>
  </div>

  <!-- OBRA SELECIONADA -->
  <div class="obra-banner">
    <div class="obra-banner-icon">🏗️</div>
    <div class="obra-banner-info">
      <div class="obra-banner-name" id="obra-banner-name">Obra</div>
      <div class="obra-banner-id" id="obra-banner-id">ID: —</div>
    </div>
  </div>

  <!-- HEADER DO PASSO -->
  <div class="steps-header">
    <div class="step-counter">
      <div class="step-label" id="step-label">PASSO 1 DE 5</div>
      <div class="step-pct" id="step-pct">20%</div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:20%"></div>
    </div>
    <div class="step-title" id="step-title">PASSO 1: FOTO DA OBRA<span></span></div>
  </div>

  <!-- CONTEÚDO DO PASSO (renderizado dinamicamente) -->
  <div class="step-content" id="step-body"></div>

  <!-- BOTÃO AVANÇAR / SALVAR -->
  <div style="padding: 0 16px 16px">
    <button class="btn-primary" id="btn-next" onclick="avancar()" disabled>
      AVANÇAR →
    </button>
  </div>

</div><!-- /screen-steps -->

<!-- Scripts -->
<script src="storage.js"></script>
<script src="api.js"></script>
<script src="app.js"></script>

<script>
  // Registrar botão "Registrar Hoje" para selecionar obra antes de abrir fluxo
  function mostrarSeletorObra() {
    if (state.obras.length === 0) {
      showToast && showToast('Nenhuma obra disponível', 'warning');
      return;
    }
    if (state.obras.length === 1) {
      // Se só tem uma obra, seleciona direto
      const o = state.obras[0];
      selecionarObra(o.id_obra, o.nome);
      return;
    }
    // Scroll para lista de obras com destaque
    document.getElementById('obras-list').scrollIntoView({ behavior: 'smooth' });
    showToast('Selecione uma obra abaixo', '');
  }
</script>

</body>
</html>
