<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0F172A">
    <title>OBRALOG PRO</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,600,0,0" rel="stylesheet">

    <style>
        /* ============================================================
           DESIGN SYSTEM — OBRALOG PRO
           Tema: Industrial / Painel de Controle / Campo
        ============================================================ */
        :root {
            --bg:        #0F172A;
            --surface:   #1E293B;
            --surface2:  #263145;
            --border:    #334155;
            --primary:   #F59E0B;
            --primary-d: #D97706;
            --success:   #22C55E;
            --error:     #EF4444;
            --warn:      #EAB308;
            --text:      #F1F5F9;
            --muted:     #94A3B8;
            --radius:    8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 16px;
            min-height: 100vh;
            overscroll-behavior: none;
        }

        /* HEADINGS — Rajdhani (militar/técnico) */
        .font-head { font-family: 'Rajdhani', sans-serif; }

        /* ---- UTILITÁRIOS ---- */
        .hidden { display: none !important; }
        .flex   { display: flex; }
        .col    { flex-direction: column; }
        .gap-8  { gap: 8px; }
        .gap-12 { gap: 12px; }
        .gap-16 { gap: 16px; }
        .center { align-items: center; justify-content: center; }

        /* ---- LOADING OVERLAY ---- */
        #loading-overlay {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(15,23,42,0.92);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        #loading-overlay.show { display: flex; }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* ---- TOAST ---- */
        #toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(12px);
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 20px;
            border-radius: var(--radius);
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.25s, transform 0.25s;
            z-index: 150;
            max-width: 90vw;
            white-space: normal;
            text-align: center;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.success { border-color: var(--success); color: var(--success); }
        #toast.warning { border-color: var(--warn);    color: var(--warn);    }
        #toast.error   { border-color: var(--error);   color: var(--error);   }

        /* ---- HEADER ---- */
        #app-header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .header-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .header-logo .logo-icon {
            width: 32px; height: 32px;
            background: var(--primary);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-logo .logo-icon span { font-size: 18px; color: #000; }
        .header-logo .logo-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            line-height: 1;
        }
        .header-logo .logo-sub {
            font-size: 0.6rem;
            color: var(--muted);
            letter-spacing: 0.12em;
            font-weight: 500;
        }
        
        /* Status badge no header */
        #online-badge {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            padding: 4px 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #online-badge::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        #online-badge.online  { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid rgba(34,197,94,0.3); }
        #online-badge.online::before  { background: var(--success); }
        #online-badge.offline { background: rgba(239,68,68,0.15);  color: var(--error);   border: 1px solid rgba(239,68,68,0.3);  }
        #online-badge.offline::before { background: var(--error); animation: pulse-dot 1.5s infinite; }
        @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* ---- TELA PRINCIPAL ---- */
        .screen { padding-top: 56px; min-height: 100vh; }

        /* ---- HOME ---- */
        #screen-home {
            padding: 0 16px 100px;
        }

        /* Resumo do dia */
        .home-stats {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            margin: 0 -16px;
        }
        .stat-block {
            padding: 16px;
            background: var(--surface);
        }
        .stat-block:first-child { border-right: 1px solid var(--border); }
        .stat-label {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .stat-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }
        .stat-value.has-pending { color: var(--warn); }

        /* Busca */
        .search-wrap {
            margin: 16px 0 12px;
            position: relative;
        }
        .search-wrap .material-symbols-outlined {
            position: absolute;
            left: 12px; top: 50%; transform: translateY(-50%);
            color: var(--muted);
            font-size: 20px;
            pointer-events: none;
        }
        #search-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 12px 12px 40px;
            border-radius: var(--radius);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        #search-input:focus { border-color: var(--primary); }
        #search-input::placeholder { color: var(--muted); }

        /* Label secção */
        .section-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        /* Cards de obra */
        #obras-list { display: flex; flex-direction: column; gap: 8px; }

        .obra-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.15s, transform 0.1s;
            display: flex;
            align-items: stretch;
            min-height: 88px;
            -webkit-user-select: none; user-select: none;
        }
        .obra-card:active { transform: scale(0.99); border-color: var(--primary); }

        .obra-card-accent {
            width: 4px;
            background: var(--border);
            flex-shrink: 0;
        }
        .obra-card.status-andamento .obra-card-accent { background: var(--success); }
        .obra-card.status-pendente  .obra-card-accent { background: var(--warn);    }
        .obra-card.status-registrada .obra-card-accent { background: var(--primary); }

        .obra-card-img {
            width: 72px;
            flex-shrink: 0;
            object-fit: cover;
        }
        .obra-card-img-placeholder {
            width: 72px;
            flex-shrink: 0;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .obra-card-body {
            flex: 1;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            min-width: 0;
        }
        .obra-card-id {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: var(--primary);
            font-family: 'Rajdhani', sans-serif;
        }
        .obra-card-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .obra-card-manager {
            font-size: 0.75rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .obra-card-badge {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            padding: 2px 8px;
            border-radius: 4px;
            align-self: flex-start;
        }
        .badge-em-andamento { background: rgba(34,197,94,0.15);  color: var(--success); }
        .badge-pendente      { background: rgba(234,179,8,0.15);   color: var(--warn);    }
        .badge-registrada    { background: rgba(245,158,11,0.15);  color: var(--primary); }

        .obra-card-arrow {
            display: flex;
            align-items: center;
            padding-right: 14px;
            color: var(--muted);
        }

        /* Empty state */
        .empty-state {
            background: var(--surface);
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            padding: 40px 24px;
            text-align: center;
        }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
        .empty-state .msg {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        /* Botão principal da home */
        #btn-registrar-home {
            position: fixed;
            bottom: 24px;
            left: 50%; transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 420px;
            background: var(--primary);
            color: #000;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            padding: 16px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s, transform 0.1s;
            z-index: 50;
        }
        #btn-registrar-home:active { background: var(--primary-d); transform: translateX(-50%) scale(0.99); }
        #btn-registrar-home .material-symbols-outlined { font-size: 22px; }

        /* ============================================================
           TELA DE STEPS
        ============================================================ */
        #screen-steps { display: none; padding-bottom: 100px; }

        /* Banner da obra selecionada */
        #obra-banner {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .banner-back {
            background: none; border: none; color: var(--muted);
            cursor: pointer; padding: 4px;
            display: flex; align-items: center;
        }
        .banner-back:active { color: var(--text); }
        .banner-info { flex: 1; min-width: 0; }
        #obra-banner-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        #obra-banner-id { font-size: 0.65rem; color: var(--primary); font-weight: 600; letter-spacing: 0.1em; }

        /* Step nav — bolas numeradas */
        #step-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 0;
        }
        .step-dot {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
        }
        .step-dot.done {
            background: rgba(34,197,94,0.15);
            border-color: var(--success);
            color: var(--success);
        }
        .step-dot.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #000;
        }
        .step-connector {
            flex: 1;
            height: 2px;
            background: var(--border);
            transition: background 0.3s;
        }
        .step-connector.done { background: var(--success); }

        /* Progress bar fina */
        #progress-bar {
            height: 3px;
            background: var(--border);
            position: relative;
        }
        #progress-fill {
            height: 100%;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        /* Header do step atual */
        #step-header {
            padding: 20px 16px 12px;
        }
        #step-label {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        #step-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.1;
        }

        /* Corpo do step */
        #step-body { padding: 0 16px; }

        /* ---- BOTÃO NEXT ---- */
        #btn-next-wrap {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--bg);
            border-top: 1px solid var(--border);
            padding: 16px;
            z-index: 50;
        }
        #btn-next {
            width: 100%;
            background: var(--primary);
            color: #000;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            padding: 16px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s, transform 0.1s, opacity 0.2s;
        }
        #btn-next:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        #btn-next:not(:disabled):active { transform: scale(0.99); background: var(--primary-d); }
        #btn-next.dark {
            background: var(--success);
        }
        #btn-next.dark:not(:disabled):active { background: #16a34a; }

        /* ============================================================
           COMPONENTS DE STEPS
        ============================================================ */

        /* Hint */
        .step-hint {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 16px;
            line-height: 1.5;
        }

        /* FOTO */
        .photo-zone {
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            aspect-ratio: 4/3;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        .photo-zone:active { border-color: var(--primary); }
        .photo-zone.has-photo { border-style: solid; border-color: var(--success); }
        .photo-zone img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .photo-zone-placeholder {
            display: flex; flex-direction: column;
            align-items: center; gap: 8px;
            color: var(--muted);
        }
        .photo-zone-placeholder .icon { font-size: 2.5rem; }
        .photo-zone-placeholder .text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-align: center;
        }
        .photo-zone.has-photo .photo-zone-placeholder { display: none; }

        /* BUTTONS */
        .btn-primary {
            width: 100%;
            background: var(--primary);
            color: #000;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            padding: 14px 16px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.15s, transform 0.1s;
            margin-bottom: 8px;
        }
        .btn-primary:active { background: var(--primary-d); transform: scale(0.99); }

        .btn-secondary {
            width: 100%;
            background: transparent;
            color: var(--muted);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: border-color 0.15s, color 0.15s, transform 0.1s;
            margin-bottom: 8px;
        }
        .btn-secondary:active { border-color: var(--text); color: var(--text); transform: scale(0.99); }

        /* ALERTS */
        .field-alert {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: var(--radius);
            padding: 12px 14px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
        }
        .field-tip {
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: var(--radius);
            padding: 12px 14px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
        }
        .field-warn {
            background: rgba(234,179,8,0.1);
            border: 1px solid rgba(234,179,8,0.3);
            border-radius: var(--radius);
            padding: 12px 14px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
        }
        .alert-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
        .alert-text { font-size: 0.82rem; color: var(--text); line-height: 1.5; }
        .alert-text strong { display: block; margin-bottom: 2px; }

        /* ATIVIDADES */
        .atividade-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }
        .atividade-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            position: relative;
            transition: border-color 0.15s, background 0.15s, transform 0.1s;
            -webkit-user-select: none; user-select: none;
        }
        .atividade-btn:active { transform: scale(0.97); }
        .atividade-btn.selected {
            border-color: var(--primary);
            background: rgba(245,158,11,0.1);
        }
        .atividade-btn .check {
            position: absolute; top: 6px; right: 8px;
            font-size: 0.7rem; color: var(--primary);
            opacity: 0; transition: opacity 0.15s;
        }
        .atividade-btn.selected .check { opacity: 1; }
        .atividade-btn .icon { font-size: 1.6rem; }
        .atividade-btn .label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: var(--text);
            text-align: center;
        }

        .atividade-outro {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            margin-bottom: 8px;
            transition: border-color 0.15s, background 0.15s;
        }
        .atividade-outro.selected-outro { border-color: var(--primary); background: rgba(245,158,11,0.08); }
        .atividade-outro .label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: var(--text);
        }
        .atividade-outro span { color: var(--muted); font-size: 1.2rem; }

        /* Sim/Não */
        .sim-nao-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .sn-btn {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: border-color 0.15s, background 0.15s, transform 0.1s;
        }
        .sn-btn:active { transform: scale(0.97); }
        .sn-btn.selected-sim { border-color: var(--error);   background: rgba(239,68,68,0.1); }
        .sn-btn.selected-nao { border-color: var(--success); background: rgba(34,197,94,0.1); }
        .sn-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
        }
        .sn-icon { font-size: 1.5rem; }

        .categoria-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .categoria-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .categoria-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s, transform 0.1s;
        }
        .categoria-item:active { transform: scale(0.99); }
        .categoria-item.selected { border-color: var(--error); background: rgba(239,68,68,0.08); }
        .cat-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.04em;
        }
        .cat-sub { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
        .cat-icon { font-size: 1.2rem; }

        .textarea-problema {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 14px;
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            resize: none;
            outline: none;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        .textarea-problema:focus { border-color: var(--primary); }
        .textarea-problema::placeholder { color: var(--muted); }

        /* MEDIÇÃO */
        .medicao-chips {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        .chip-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            transition: border-color 0.15s, background 0.15s, transform 0.1s;
        }
        .chip-btn:active { transform: scale(0.95); }
        .chip-btn.selected { border-color: var(--primary); background: rgba(245,158,11,0.1); }
        .chip-val {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
        }
        .chip-unit { font-size: 0.6rem; color: var(--muted); font-weight: 600; letter-spacing: 0.08em; }

        .medicao-manual-label {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .medicao-input-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            padding: 0 14px;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        .medicao-input-wrap:focus-within { border-color: var(--primary); }
        .medicao-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            padding: 16px 0;
            outline: none;
            min-width: 0;
        }
        .medicao-input::placeholder { color: var(--muted); }

        /* RESUMO */
        .resumo-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 12px;
        }
        .resumo-row {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .resumo-row:last-child { border-bottom: none; }
        .resumo-sublabel {
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            color: var(--muted);
            text-transform: uppercase;
        }
        .resumo-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }
        .resumo-value.big {
            font-size: 1.5rem;
            color: var(--primary);
        }

        .resumo-problema-card {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: var(--radius);
            padding: 14px 16px;
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .rp-icon { font-size: 1.2rem; flex-shrink: 0; }
        .rp-title { font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; font-weight: 700; color: var(--error); margin-bottom: 4px; }
        .rp-text  { font-size: 0.82rem; color: var(--text); line-height: 1.5; }

        .media-section-label {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .media-grid { margin-bottom: 12px; }
        .media-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            display: block;
        }

        /* Inputs genéricos */
        .search-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 14px;
            border-radius: var(--radius);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus { border-color: var(--primary); }
        .search-input::placeholder { color: var(--muted); }

    </style>
</head>

<body>

    <!-- Loading -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text">AGUARDE...</p>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- Header global -->
    <header id="app-header">
        <div class="header-logo" onclick="voltarHome()">
            <div class="logo-icon">
                <span class="material-symbols-outlined">construction</span>
            </div>
            <div>
                <div class="logo-text font-head">OBRALOG PRO</div>
                <div class="logo-sub">DIÁRIO DE OBRA</div>
            </div>
        </div>
        <div id="online-badge" class="online">CONECTADO</div>
    </header>

    <!-- ============================================================
         TELA HOME
    ============================================================ -->
    <div id="screen-home" class="screen">

        <div class="home-stats">
            <div class="stat-block">
                <div class="stat-label">Obras ativas</div>
                <div class="stat-value" id="stat-obras">00</div>
            </div>
            <div class="stat-block">
                <div class="stat-label">Pendentes envio</div>
                <div class="stat-value" id="stat-pending">00</div>
            </div>
        </div>

        <div style="padding:16px">

            <div class="search-wrap">
                <span class="material-symbols-outlined">search</span>
                <input type="search" id="search-input" placeholder="Buscar obra...">
            </div>

            <div class="section-label">Selecione a obra</div>

            <div id="obras-list">
                <div class="empty-state" style="animation: pulse-dot 1.5s infinite">
                    <div class="icon">⏳</div>
                    <div class="msg">CARREGANDO...</div>
                </div>
            </div>

        </div>

        <button id="btn-registrar-home">
            <span class="material-symbols-outlined">add_circle</span>
            NOVO REGISTRO
        </button>
    </div>

    <!-- ============================================================
         TELA DE STEPS
    ============================================================ -->
    <div id="screen-steps" class="screen">

        <!-- Banner obra selecionada -->
        <div id="obra-banner">
            <button class="banner-back" onclick="voltarHome()" aria-label="Voltar">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <div class="banner-info">
                <div id="obra-banner-name">—</div>
                <div id="obra-banner-id">—</div>
            </div>
        </div>

        <!-- Step nav visual -->
        <div id="step-nav"></div>

        <!-- Progress bar -->
        <div id="progress-bar">
            <div id="progress-fill" style="width:0%"></div>
        </div>

        <!-- Header do step -->
        <div id="step-header">
            <div id="step-label">ETAPA 1 DE 5</div>
            <div id="step-title" class="font-head">—</div>
        </div>

        <!-- Conteúdo do step -->
        <div id="step-body"></div>

        <!-- Botão next fixo -->
        <div id="btn-next-wrap">
            <button id="btn-next" onclick="avancar()">CONTINUAR →</button>
        </div>

    </div>

    <script src="storage.js"></script>
    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
