<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SITE LOG PRO - Arquitetura Digital</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,700,0,0" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        klein: '#002FA7',
                        kleinDark: '#001b63',
                        bauhausYellow: '#FFD600',
                        ink: '#121212',
                        paper: '#F7F7F7',
                    },
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* Tipografia e Base */
        body { background-color: #F7F7F7; color: #121212; overflow-x: hidden; }
        
        /* Ocultar views do SPA */
        .hidden-view { display: none !important; }

        /* Efeitos Visuais UI/UX */
        .glass-nav {
            background: rgba(247, 247, 247, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .clay-btn {
            background: #002FA7;
            color: white;
            border-radius: 20px;
            box-shadow: 
                8px 8px 16px rgba(0, 0, 0, 0.2),
                -4px -4px 12px rgba(255, 255, 255, 0.2),
                inset 2px 2px 8px rgba(255, 255, 255, 0.3),
                inset -2px -2px 8px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        
        .clay-btn:active {
            transform: scale(0.97) translateY(2px);
            box-shadow: 
                4px 4px 8px rgba(0, 0, 0, 0.2),
                -2px -2px 6px rgba(255, 255, 255, 0.2),
                inset 4px 4px 12px rgba(0, 0, 0, 0.4),
                inset -2px -2px 6px rgba(255, 255, 255, 0.1);
        }

        .clay-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 
                6px 6px 12px rgba(0, 0, 0, 0.05),
                -4px -4px 10px rgba(255, 255, 255, 0.8);
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .clay-card.selected {
            border-color: #002FA7;
            background: #f0f4ff;
        }

        /* Alto Contraste Brutalista */
        .brutalist-border {
            border: 4px solid #121212;
            box-shadow: 4px 4px 0px #121212;
        }
    </style>
</head>
<body class="pb-24">

    <header class="fixed top-0 w-full z-50 glass-nav px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3 cursor-pointer" onclick="goTo('home')">
            <span class="material-symbols-outlined text-ink">arrow_back</span>
            <h1 class="text-xl font-black tracking-tighter uppercase">SITE LOG PRO</h1>
        </div>
        <div class="w-3 h-3 rounded-full bg-klein animate-pulse"></div>
    </header>

    <main class="pt-20 px-6 max-w-md mx-auto">

        <section id="view-home" class="view-section">
            <div class="mb-8">
                <h2 class="text-4xl font-black uppercase leading-none mb-2">Painel de Obras</h2>
                <p class="text-sm font-bold text-gray-500 uppercase tracking-widest">Selecione o local de operação</p>
            </div>

            <div id="lista-obras" class="flex flex-col gap-4">
                <div class="p-8 text-center text-gray-500 font-bold animate-pulse">Carregando obras...</div>
            </div>
        </section>

        <section id="view-step1" class="view-section hidden-view">
            <div class="mb-8">
                <span class="text-klein font-black text-xl">01/04</span>
                <h2 class="text-5xl font-black uppercase leading-none mt-2">Câmera</h2>
            </div>

            <div class="clay-card aspect-square flex flex-col items-center justify-center relative overflow-hidden mb-8 bg-gray-100">
                <img id="preview-img" class="absolute w-full h-full object-cover hidden">
                <span id="cam-icon" class="material-symbols-outlined text-6xl text-gray-300">photo_camera</span>
                
                <input type="file" id="camera-input" accept="image/*" capture="environment" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10">
            </div>

            <button onclick="goTo('step2')" id="btn-next-1" class="clay-btn w-full py-5 text-xl font-black uppercase tracking-widest hidden">Avançar</button>
        </section>

        <section id="view-step2" class="view-section hidden-view">
            <div class="mb-8">
                <span class="text-klein font-black text-xl">02/04</span>
                <h2 class="text-5xl font-black uppercase leading-none mt-2">Atividade</h2>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="selectActivity('Concretagem', this)" class="clay-card flex flex-col items-start p-5 gap-4">
                    <span class="material-symbols-outlined text-3xl">foundation</span>
                    <span class="font-bold uppercase tracking-tight">Concretagem</span>
                </button>
                <button onclick="selectActivity('Alvenaria', this)" class="clay-card flex flex-col items-start p-5 gap-4">
                    <span class="material-symbols-outlined text-3xl">domain</span>
                    <span class="font-bold uppercase tracking-tight">Alvenaria</span>
                </button>
                <button onclick="selectActivity('Elétrica', this)" class="clay-card flex flex-col items-start p-5 gap-4">
                    <span class="material-symbols-outlined text-3xl">electrical_services</span>
                    <span class="font-bold uppercase tracking-tight">Elétrica</span>
                </button>
                <button onclick="selectActivity('Hidráulica', this)" class="clay-card flex flex-col items-start p-5 gap-4">
                    <span class="material-symbols-outlined text-3xl">plumbing</span>
                    <span class="font-bold uppercase tracking-tight">Hidráulica</span>
                </button>
            </div>

            <button onclick="goTo('step3')" class="clay-btn w-full py-5 text-xl font-black uppercase tracking-widest">Avançar</button>
        </section>

        <section id="view-step3" class="view-section hidden-view">
            <div class="mb-8">
                <span class="text-klein font-black text-xl">03/04</span>
                <h2 class="text-5xl font-black uppercase leading-none mt-2">Status</h2>
            </div>

            <label class="font-bold uppercase tracking-widest text-xs text-gray-500 mb-2 block">Ocorrências</label>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="selectProblem(true, this)" class="clay-card flex items-center justify-center py-6 gap-2 border-2 border-transparent">
                    <span class="material-symbols-outlined text-red-600">warning</span>
                    <span class="font-black uppercase">Sim</span>
                </button>
                <button onclick="selectProblem(false, this)" class="clay-card selected flex items-center justify-center py-6 gap-2 border-2 border-transparent">
                    <span class="material-symbols-outlined text-green-600">check_circle</span>
                    <span class="font-black uppercase">Não</span>
                </button>
            </div>

            <label class="font-bold uppercase tracking-widest text-xs text-gray-500 mb-2 block">Medição Executada</label>
            <div class="brutalist-border bg-white flex items-center px-4 mb-8">
                <input type="number" id="input-medicao" class="w-full py-4 text-3xl font-black outline-none" placeholder="0" oninput="appState.medicao = this.value">
                <span class="font-black text-xl text-gray-400">M²</span>
            </div>

            <button onclick="buildSummary(); goTo('step4')" class="clay-btn w-full py-5 text-xl font-black uppercase tracking-widest">Verificar</button>
        </section>

        <section id="view-step4" class="view-section hidden-view">
            <div class="mb-8">
                <span class="text-klein font-black text-xl">04/04</span>
                <h2 class="text-5xl font-black uppercase leading-none mt-2">Resumo</h2>
            </div>

            <div class="brutalist-border bg-bauhausYellow p-6 mb-8 flex flex-col gap-4">
                <div>
                    <span class="text-[10px] font-black uppercase tracking-widest">Obra</span>
                    <p id="res-obra" class="text-xl font-black uppercase leading-tight">-</p>
                </div>
                <div class="w-full h-1 bg-ink"></div>
                <div class="flex justify-between items-end">
                    <div>
                        <span class="text-[10px] font-black uppercase tracking-widest">Atividade</span>
                        <p id="res-ativ" class="text-lg font-bold uppercase">-</p>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] font-black uppercase tracking-widest">Volume</span>
                        <p id="res-med" class="text-3xl font-black">0 M²</p>
                    </div>
                </div>
                <div id="res-prob-badge" class="bg-ink text-white font-bold uppercase text-xs py-2 px-3 self-start hidden">Com Ocorrência</div>
            </div>

            <button id="btn-submit" onclick="submitData()" class="clay-btn w-full py-6 text-2xl font-black uppercase tracking-widest flex items-center justify-center gap-3">
                <span class="material-symbols-outlined">publish</span> Sincronizar
            </button>
        </section>

    </main>

    <nav class="fixed bottom-0 w-full glass-nav flex justify-around py-4 pb-6 z-40">
        <div class="flex flex-col items-center opacity-50"><span class="material-symbols-outlined text-3xl">list_alt</span></div>
        <div class="flex flex-col items-center text-klein"><span class="material-symbols-outlined text-3xl">add_circle</span></div>
        <div class="flex flex-col items-center opacity-50"><span class="material-symbols-outlined text-3xl">person</span></div>
    </nav>

    <script>
        // Substitua por sua URL gerada no Google Apps Script
        const API_URL = "SUA_URL_DO_WEB_APP_AQUI";

        // Estado Global da Aplicação
        const appState = {
            id_obra: null,
            nome_obra: null,
            foto_base64: null,
            atividade: 'Concretagem', // Default
            teve_problema: false, // Default
            medicao: 0,
            criado_por: "Alexandre"
        };

        // Roteamento SPA
        function goTo(view) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden-view'));
            document.getElementById(`view-${view}`).classList.remove('hidden-view');
            window.scrollTo(0,0);
        }

        // Fluxo Inicial
        function startLog(id, nome) {
            appState.id_obra = id;
            appState.nome_obra = nome;
            goTo('step1');
        }

        // Seleções de Interface
        function selectActivity(name, btnElement) {
            appState.atividade = name;
            btnElement.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
            btnElement.classList.add('selected');
        }

        function selectProblem(status, btnElement) {
            appState.teve_problema = status;
            btnElement.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
            btnElement.classList.add('selected');
        }

        // Prepara Resumo Final
        function buildSummary() {
            document.getElementById('res-obra').innerText = appState.nome_obra;
            document.getElementById('res-ativ').innerText = appState.atividade;
            document.getElementById('res-med').innerText = `${appState.medicao || 0} M²`;
            
            const badge = document.getElementById('res-prob-badge');
            if(appState.teve_problema) {
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        // Tratamento da Câmera
        document.getElementById('camera-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    appState.foto_base64 = reader.result;
                    document.getElementById('preview-img').src = reader.result;
                    document.getElementById('preview-img').classList.remove('hidden');
                    document.getElementById('cam-icon').classList.add('hidden');
                    document.getElementById('btn-next-1').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        // Chamadas de API
        async function fetchObras() {
            const container = document.getElementById('lista-obras');
            try {
                // Se a URL não estiver configurada, mostra mock data para testes de UI
                if(API_URL === "SUA_URL_DO_WEB_APP_AQUI") {
                    renderObrasMock();
                    return;
                }

                const response = await fetch(`${API_URL}?action=listarObras`);
                const json = await response.json();
                
                container.innerHTML = '';
                if(json.success && json.data.length > 0) {
                    json.data.forEach(obra => {
                        container.innerHTML += `
                            <div onclick="startLog('${obra.id_obra}', '${obra.nome}')" class="clay-card p-6 flex flex-col gap-2 cursor-pointer border-l-8 border-klein">
                                <span class="text-[10px] font-black uppercase text-gray-400">ID: ${obra.id_obra.substring(0,8)}</span>
                                <h3 class="text-2xl font-black uppercase leading-none">${obra.nome}</h3>
                                <p class="text-sm font-bold text-gray-500">${obra.empresa}</p>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = `<div class="p-8 font-bold text-center">Nenhuma obra encontrada.</div>`;
                }
            } catch (error) {
                container.innerHTML = `<div class="p-8 font-bold text-red-500 text-center">Erro de conexão.</div>`;
            }
        }

        async function submitData() {
            const btn = document.getElementById('btn-submit');
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">refresh</span> Processando...`;
            btn.classList.add('opacity-80', 'pointer-events-none');

            try {
                // 1. Posta o Registro
                const payloadText = {
                    id_obra: appState.id_obra,
                    descricao_atividade: appState.atividade,
                    problemas: appState.teve_problema ? "Sim" : "Não",
                    medicoes: `${appState.medicao} M²`,
                    criado_por: appState.criado_por
                };

                const resReg = await fetch(`${API_URL}?action=criarRegistro`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payloadText),
                    redirect: 'follow'
                }).then(r => r.json());

                // 2. Posta a Foto se sucesso no passo anterior
                if(resReg.success && appState.foto_base64) {
                    const payloadImg = {
                        id_registro: resReg.data.id_registro,
                        base64: appState.foto_base64
                    };
                    await fetch(`${API_URL}?action=uploadFoto`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payloadImg),
                        redirect: 'follow'
                    });
                }

                alert("Sincronização concluída com sucesso!");
                window.location.reload(); // Reset rápido (AOK)

            } catch(e) {
                alert("Erro ao enviar dados ao servidor.");
                btn.innerHTML = `<span class="material-symbols-outlined">publish</span> Tentar Novamente`;
                btn.classList.remove('opacity-80', 'pointer-events-none');
            }
        }

        // Mock para teste visual imediato
        function renderObrasMock() {
            document.getElementById('lista-obras').innerHTML = `
                <div onclick="startLog('ID-01', 'Complexo Viário Norte')" class="clay-card p-6 flex flex-col gap-2 cursor-pointer border-l-8 border-klein">
                    <span class="text-[10px] font-black uppercase text-gray-400">ID: #MOC-01</span>
                    <h3 class="text-2xl font-black uppercase leading-none">Complexo Viário Norte</h3>
                    <p class="text-sm font-bold text-gray-500">Construtora Alfa</p>
                </div>
                <div onclick="startLog('ID-02', 'UBS Santa Lúcia')" class="clay-card p-6 flex flex-col gap-2 cursor-pointer border-l-8 border-bauhausYellow">
                    <span class="text-[10px] font-black uppercase text-gray-400">ID: #MOC-02</span>
                    <h3 class="text-2xl font-black uppercase leading-none">UBS Santa Lúcia</h3>
                    <p class="text-sm font-bold text-gray-500">Secretaria de Saúde</p>
                </div>
            `;
        }

        // Boot
        window.onload = fetchObras;
    </script>
</body>
</html>
